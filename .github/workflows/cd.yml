name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push Docker images to GitHub Container Registry"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fastapi
            context: ./inference
            dockerfile: ./inference/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: trainer
            context: .
            dockerfile: ./training/Dockerfile
          - service: airflow
            context: ./airflow
            dockerfile: ./airflow/Dockerfile
          - service: spark
            context: ./spark
            dockerfile: ./spark/Dockerfile
          - service: mlflow
            context: ./mlflow
            dockerfile: ./mlflow/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          ref="${GITHUB_REF_NAME:-manual}"
          sha="${GITHUB_SHA::7}"
          echo "IMAGE_NAME=ghcr.io/${repo}-${{ matrix.service }}" >> "$GITHUB_ENV"
          echo "IMAGE_VERSION=${ref}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${sha}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.push_images }}" = "true" ]; then
            echo "PUSH_IMAGES=true" >> "$GITHUB_ENV"
          else
            echo "PUSH_IMAGES=false" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-release-check:
    name: Validate release compose bundle
    runs-on: ubuntu-latest
    needs: docker-images

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate compose with all profiles
        run: docker compose --profile training --profile streaming config --quiet
