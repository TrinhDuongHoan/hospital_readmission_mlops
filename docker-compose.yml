services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create_topics.sh:/create_topics.sh:ro
    command: >
      bash -c "
      for attempt in {1..30}; do
        kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break;
        echo 'Waiting for Kafka...';
        sleep 2;
      done;
      bash /create_topics.sh
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minio minio123;
      mc mb -p local/mlops-hospital || true;
      mc mb -p local/mlflow-artifacts || true;
      mc mb -p local/dvc-storage || true;
      exit 0;
      "

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: mlflow
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_SERVER_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,mlflow,mlflow:5000,localhost:5000,127.0.0.1:5000
      - MLFLOW_SERVER_CORS_ALLOWED_ORIGINS=http://localhost:5000,http://127.0.0.1:5000
      - MLFLOW_STATIC_PREFIX=/tools/mlflow
    volumes:
      - ./mlruns:/mlruns
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/tools/mlflow/', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    command: >
      bash -c "
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root s3://mlflow-artifacts
      --static-prefix /tools/mlflow
      "
  trainer:
    build:
      context: .
      dockerfile: training/Dockerfile
    container_name: trainer
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    working_dir: /opt/project
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_DEFAULT_REGION=us-east-1
      - MLFLOW_MODEL_NAME=HospitalReadmissionModel
      - MLFLOW_EXPERIMENT_NAME=Hospital_Readmission
      - CSV_PATH=/opt/project/data/diabetic_data.csv
      - MODEL_LOCAL_PATH=/opt/project/models/model.pkl
      - METRICS_PATH=/opt/project/reports/metrics.json
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/opt/project
    command: >
      bash -c "
      set -e;
      python -c \"exec('import time, urllib.request\\nurl = \\'http://mlflow:5000/tools/mlflow/\\'\\nprint(f\\'Waiting for MLflow at {url}\\')\\nlast_error = None\\nfor attempt in range(60):\\n    try:\\n        urllib.request.urlopen(url, timeout=3).read()\\n        print(\\'MLflow is ready\\')\\n        break\\n    except Exception as exc:\\n        last_error = exc\\n        time.sleep(2)\\nelse:\\n    raise SystemExit(f\\'MLflow was not ready after 120 seconds: {last_error}\\')')\" &&
      python -m training.train &&
      python -m training.register_model
      "

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
      POSTGRES_DB: mlops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d mlops"]
      interval: 10s
      timeout: 5s
      retries: 20
    
  fastapi:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: fastapi
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_started
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_NAME=HospitalReadmissionModel
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_DEFAULT_REGION=us-east-1
      - DATABASE_URL=postgresql://mlops:mlops123@postgres:5432/mlops
      - AIRFLOW_API_BASE_URL=http://airflow-webserver:8080/tools/airflow/api/v1
      - AIRFLOW_USERNAME=admin
      - AIRFLOW_PASSWORD=admin
      - JWT_SECRET_KEY=hospital-readmission-mlops-secret-key
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - SEED_DEFAULT_USERS=true
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/opt/project
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - fastapi
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9090/-/healthy >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  grafana:
    image: grafana/grafana
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://localhost:3001/tools/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_COOKIE_NAME=hospital_grafana_session
      - GF_SECURITY_COOKIE_SAMESITE=lax
      - GF_SECURITY_CSRF_TRUSTED_ORIGINS=http://localhost:3001 http://127.0.0.1:3001 http://0.0.0.0:3001
      - GF_LIVE_ALLOWED_ORIGINS=*
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
  
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    user: root
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host 0.0.0.0
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./:/opt/project

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8082:8081"
    volumes:
      - ./:/opt/project
  
  spark-streaming:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-streaming
    user: root
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    volumes:
      - ./:/opt/project
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3
      /opt/project/spark/jobs/streaming_etl.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[s]treaming_etl.py'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
  
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      minio:
        condition: service_started
      spark-master:
        condition: service_started
    ports:
      - "8088:8080"
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__WEBSERVER__X_FRAME_ENABLED=True
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:3001/tools/airflow
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_DEFAULT_REGION=us-east-1
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - DATABASE_URL=postgresql://mlops:mlops123@postgres:5432/mlops
      - RETRAIN_MIN_NEW_PREDICTIONS=50
      - RETRAIN_MIN_NEW_LABELS=10
      - FASTAPI_RELOAD_USERNAME=admin01
      - FASTAPI_RELOAD_PASSWORD=admin123
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mlops:mlops123@postgres:5432/mlops
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=patient-events
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - airflow_home:/opt/airflow
      - ./:/opt/project
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      airflow db init &&
      airflow users create
      --username admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com
      --password admin || true &&
      airflow webserver
      "
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/tools/airflow/health >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    depends_on:
      airflow-webserver:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__WEBSERVER__X_FRAME_ENABLED=True
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:3001/tools/airflow
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_DEFAULT_REGION=us-east-1
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - DATABASE_URL=postgresql://mlops:mlops123@postgres:5432/mlops
      - RETRAIN_MIN_NEW_PREDICTIONS=50
      - RETRAIN_MIN_NEW_LABELS=10
      - FASTAPI_RELOAD_USERNAME=admin01
      - FASTAPI_RELOAD_PASSWORD=admin123
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mlops:mlops123@postgres:5432/mlops
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=patient-events
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - airflow_home:/opt/airflow
      - ./:/opt/project
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  minio_data:
  airflow_home:
  postgres_data:
  grafana_data:
